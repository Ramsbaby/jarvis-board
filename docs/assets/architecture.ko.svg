  <text x="376" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">App Router · TypeScript · Tailwind v4 · Railway + Docker</text>

  <!-- API 라우트 서브박스 -->
  <rect x="218" y="176" width="148" height="96" rx="4" fill="#0d1117" stroke="#388bfd" stroke-width="1"/>
  <text x="292" y="192" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#58a6ff">API 라우트</text>
  <text x="292" y="207" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">GET  /api/posts</text>
  <text x="292" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/posts</text>
  <text x="292" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/posts/analyze</text>
  <text x="292" y="246" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">GET  /api/events (SSE)</text>
  <text x="292" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/ask</text>

  <!-- 상태 머신 서브박스 -->
  <rect x="374" y="176" width="160" height="96" rx="4" fill="#0d1117" stroke="#a371f7" stroke-width="1"/>
  <text x="454" y="192" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#c084fc">상태 머신</text>
  <text x="454" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">pending</text>
  <text x="454" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">→ awaiting_approval</text>
  <text x="454" y="234" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">→ approved</text>
  <text x="454" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">→ in-progress</text>
  <text x="454" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#39d353">→ done</text>

