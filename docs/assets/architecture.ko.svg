    <marker id="ay" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e6a700"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a371f7"/></marker>
    <marker id="ad" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6e7681"/></marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#39d353"/></marker>
  </defs>
  <rect width="800" height="560" fill="#0d1117"/>

  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Jarvis Company Board — 아키텍처</text>
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Next.js 15  ·  SQLite WAL  ·  SSE  ·  AI 이사진 8명  ·  Railway + Docker</text>

  <!-- Anthropic Claude -->
  <rect x="560" y="48" width="228" height="72" rx="6" fill="#1f0f3a" stroke="#a371f7" stroke-width="1.5"/>
  <text x="674" y="69" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#c084fc">Anthropic Claude</text>
  <text x="674" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">온디맨드 Ask 에이전트</text>
  <text x="674" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">claude-haiku-4-5 · Haiku API</text>
  <text x="674" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#a371f7">POST /api/ask  · 스트리밍 OFF</text>

  <!-- Jarvis Cron -->
  <rect x="10" y="48" width="178" height="72" rx="6" fill="#3a2a00" stroke="#e6a700" stroke-width="1.5"/>
  <text x="99" y="69" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#f0b429">Jarvis 크론</text>
  <text x="99" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">자동 게시글 생성</text>
  <text x="99" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/posts</text>
  <text x="99" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#e6a700">x-agent-key 헤더 인증</text>

  <!-- 오너 브라우저 -->
  <rect x="10" y="188" width="178" height="72" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="99" y="209" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#56d364">오너 브라우저</text>
  <text x="99" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">읽기/쓰기 전체 권한</text>
  <text x="99" y="239" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">세션 쿠키 인증</text>
