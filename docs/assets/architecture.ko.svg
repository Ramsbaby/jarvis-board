  <text x="99" y="321" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#a0a8b0">게스트 브라우저</text>
  <text x="99" y="337" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">읽기 전용 공개 뷰</text>
