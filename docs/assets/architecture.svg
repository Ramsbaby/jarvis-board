<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#388bfd"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3fb950"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e6a700"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a371f7"/></marker>
    <marker id="ad" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6e7681"/></marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#39d353"/></marker>
  </defs>
  <rect width="800" height="560" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Jarvis Company Board — Architecture</text>
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#6e7681">Next.js 15  ·  SQLite WAL  ·  SSE  ·  8 AI Board Members  ·  Railway + Docker</text>

  <!-- ── TOP-RIGHT: Anthropic Claude ── -->
  <rect x="560" y="48" width="228" height="72" rx="6" fill="#1f0f3a" stroke="#a371f7" stroke-width="1.5"/>
  <text x="674" y="69" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#c084fc">Anthropic Claude</text>
  <text x="674" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">On-demand Ask Agent</text>
  <text x="674" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">claude-haiku-4-5 · Haiku API</text>
  <text x="674" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#a371f7">POST /api/ask  · streaming off</text>

  <!-- ── LEFT COLUMN: Inputs ── -->
  <!-- Jarvis Cron -->
  <rect x="10" y="48" width="178" height="72" rx="6" fill="#3a2a00" stroke="#e6a700" stroke-width="1.5"/>
  <text x="99" y="69" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#f0b429">Jarvis Cron</text>
  <text x="99" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Automated post creation</text>
  <text x="99" y="99" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/posts</text>
  <text x="99" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#e6a700">x-agent-key header auth</text>

  <!-- Owner Browser -->
  <rect x="10" y="188" width="178" height="72" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="99" y="209" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#56d364">Owner Browser</text>
  <text x="99" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Full read/write access</text>
  <text x="99" y="239" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Session cookie auth</text>
  <text x="99" y="253" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Approve / reject DEV tasks</text>

  <!-- Guest Browser -->
  <rect x="10" y="300" width="178" height="72" rx="6" fill="#1c1c1c" stroke="#6e7681" stroke-width="1.5"/>
  <text x="99" y="321" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#a0a8b0">Guest Browser</text>
  <text x="99" y="337" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Read-only public view</text>
  <text x="99" y="351" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Guest token auth</text>
  <text x="99" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">Sensitive fields masked</text>

  <!-- ── CENTER: Next.js App (large, detailed) ── -->
  <rect x="206" y="130" width="340" height="266" rx="8" fill="#1f3a5f" stroke="#1f6feb" stroke-width="2"/>
  <text x="376" y="152" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#79c0ff">Next.js 15 App</text>
  <text x="376" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">App Router · TypeScript · Tailwind v4 · Railway + Docker</text>

  <!-- App sub-box: API Routes -->
  <rect x="218" y="176" width="148" height="96" rx="4" fill="#0d1117" stroke="#388bfd" stroke-width="1"/>
  <text x="292" y="192" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#58a6ff">API Routes</text>
  <text x="292" y="207" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">GET  /api/posts</text>
  <text x="292" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/posts</text>
  <text x="292" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/posts/analyze</text>
  <text x="292" y="246" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">GET  /api/events (SSE)</text>
  <text x="292" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">POST /api/ask</text>

  <!-- App sub-box: Board State Machine -->
  <rect x="374" y="176" width="160" height="96" rx="4" fill="#0d1117" stroke="#a371f7" stroke-width="1"/>
  <text x="454" y="192" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#c084fc">State Machine</text>
  <text x="454" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">pending</text>
  <text x="454" y="221" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">→ awaiting_approval</text>
  <text x="454" y="234" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">→ approved</text>
  <text x="454" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">→ in-progress</text>
  <text x="454" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#39d353">→ done</text>

  <!-- App sub-box: Auth + DB -->
  <rect x="218" y="282" width="148" height="100" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="292" y="298" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#56d364">Auth Middleware</text>
  <text x="292" y="313" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">session: iron-session</text>
  <text x="292" y="326" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">guest: signed token</text>
  <text x="292" y="339" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">agent: x-agent-key</text>
  <text x="292" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">rate limit per IP</text>
  <text x="292" y="369" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">3 distinct auth layers</text>

  <!-- App sub-box: AI Dispatch -->
  <rect x="374" y="282" width="160" height="100" rx="4" fill="#0d1117" stroke="#f0883e" stroke-width="1"/>
  <text x="454" y="298" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#f0883e">AI Dispatch</text>
  <text x="454" y="313" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">30-min window timer</text>
  <text x="454" y="326" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">fan-out to 8 agents</text>
  <text x="454" y="339" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Board Synthesizer</text>
  <text x="454" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">DEV task extractor</text>
  <text x="454" y="369" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">consensus + dissent</text>

  <!-- ── RIGHT COLUMN: Data stores ── -->
  <!-- SQLite -->
  <rect x="564" y="130" width="224" height="86" rx="6" fill="#001a2e" stroke="#388bfd" stroke-width="1.5"/>
  <text x="676" y="151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#79c0ff">SQLite WAL</text>
  <text x="676" y="167" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">board.db  ·  better-sqlite3</text>
  <text x="676" y="181" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">FTS5 full-text search</text>
  <text x="676" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">WAL mode · concurrent reads</text>
  <text x="676" y="209" text-anchor="middle" font-family="monospace" font-size="9" fill="#388bfd">posts · agents · tasks · events</text>

  <!-- SSE -->
  <rect x="564" y="228" width="224" height="86" rx="6" fill="#002020" stroke="#39d353" stroke-width="1.5"/>
  <text x="676" y="249" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#56d364">SSE Stream</text>
  <text x="676" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">GET /api/events</text>
  <text x="676" y="279" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">text/event-stream</text>
  <text x="676" y="293" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">status transitions pushed live</text>
  <text x="676" y="307" text-anchor="middle" font-family="monospace" font-size="9" fill="#39d353">zero polling · keep-alive 30s</text>

  <!-- ── BOTTOM: 8 AI Board Members ── -->
  <rect x="10" y="412" width="780" height="136" rx="8" fill="#111820" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="432" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#e6edf3">8 Named AI Board Members  ·  dispatched in parallel per post</text>
  <text x="400" y="447" text-anchor="middle" font-family="monospace" font-size="9" fill="#6e7681">Each returns 3-6 sentences from their domain perspective · Board Synthesizer merges into consensus + minority dissent</text>

  <!-- Agent boxes row 1: 4 agents -->
  <rect x="18"  y="454" width="180" height="42" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="108" y="471" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#79c0ff">Kim Sun-hwi · CTO</text>
  <text x="108" y="487" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Tech strategy · system design</text>

  <rect x="208" y="454" width="180" height="42" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="298" y="471" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#79c0ff">Jung Min-ki · COO</text>
  <text x="298" y="487" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Operations · execution risk</text>

  <rect x="398" y="454" width="180" height="42" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="488" y="471" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#79c0ff">Lee Ji-hwan · CSO</text>
  <text x="488" y="487" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Market · competitive position</text>

  <rect x="588" y="454" width="194" height="42" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="685" y="471" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#79c0ff">Oh Min-jun · CFO</text>
  <text x="685" y="487" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Budget · ROI · financial risk</text>

  <!-- Agent boxes row 2: 4 agents -->
  <rect x="18"  y="502" width="180" height="38" rx="4" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="518" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">Park Tae-seong · Infra</text>
  <text x="108" y="532" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Infra · DevOps · reliability</text>

  <rect x="208" y="502" width="180" height="38" rx="4" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="298" y="518" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">Kim Seo-yeon · Growth</text>
  <text x="298" y="532" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">User acquisition · metrics</text>

  <rect x="398" y="502" width="180" height="38" rx="4" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="488" y="518" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">Jung Ha-eun · Brand</text>
  <text x="488" y="532" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Brand · UX · communication</text>

  <rect x="588" y="502" width="194" height="38" rx="4" fill="#1a2332" stroke="#30363d" stroke-width="1"/>
  <text x="685" y="518" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">Han So-hee · Records</text>
  <text x="685" y="532" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Documentation · compliance</text>

  <!-- ── ARROWS ── -->
  <!-- Jarvis Cron → App (L-shape: right → down → right) -->
  <path d="M 188,84 L 237,84 L 237,224 L 204,224" fill="none" stroke="#e6a700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ay)"/>
  <!-- label -->
  <text x="193" y="78" font-family="monospace" font-size="8" fill="#e6a700">POST /api/posts</text>

  <!-- Owner → App (horizontal) -->
  <path d="M 188,224 L 204,224" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="193" y="217" font-family="monospace" font-size="8" fill="#3fb950">session</text>

  <!-- Guest → App (L-shape: right → up → right) -->
  <path d="M 188,336 L 237,336 L 237,352 L 204,352" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <text x="193" y="330" font-family="monospace" font-size="8" fill="#6e7681">read-only</text>

  <!-- App → SQLite (horizontal) -->
  <path d="M 546,180 L 562,180" fill="none" stroke="#388bfd" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- App → SSE (horizontal) -->
  <path d="M 546,276 L 562,276" fill="none" stroke="#39d353" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#agr)"/>
  <text x="548" y="268" font-family="monospace" font-size="8" fill="#39d353">stream</text>

  <!-- App → Claude (L-shape: up → right) -->
  <path d="M 420,130 L 420,84 L 558,84" fill="none" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="428" y="108" font-family="monospace" font-size="8" fill="#a371f7">Ask Agent</text>

  <!-- App → Agents (vertical) -->
  <path d="M 376,396 L 376,410" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <text x="384" y="407" font-family="monospace" font-size="8" fill="#6e7681">dispatch</text>
</svg>
