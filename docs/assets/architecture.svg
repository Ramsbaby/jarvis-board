<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#e6edf3">Jarvis Company Board — Architecture</text>

  <!-- ===================== CENTER: Next.js App ===================== -->
  <rect x="290" y="180" width="220" height="110" rx="8" fill="#1f3a5f" stroke="#1f6feb" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#79c0ff">Next.js 15 App</text>
  <text x="400" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">App Router · API Routes</text>
  <text x="400" y="238" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">TypeScript · Tailwind v4</text>
  <text x="400" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Railway + Docker</text>
  <text x="400" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">SSE · SQLite WAL</text>

  <!-- ===================== LEFT: Jarvis Cron ===================== -->
  <rect x="30" y="60" width="160" height="65" rx="8" fill="#3a2a00" stroke="#e6a700" stroke-width="2"/>
  <text x="110" y="85" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#f0b429">Jarvis Cron</text>
  <text x="110" y="103" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">POST /api/posts</text>
  <text x="110" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">x-agent-key header</text>

  <!-- ===================== LEFT: Owner Browser ===================== -->
  <rect x="30" y="185" width="160" height="55" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="110" y="208" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#56d364">Owner Browser</text>
  <text x="110" y="226" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">session cookie auth</text>
  <text x="110" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">full read/write access</text>

  <!-- ===================== LEFT: Guest Browser ===================== -->
  <rect x="30" y="300" width="160" height="55" rx="8" fill="#1c1c1c" stroke="#6e7681" stroke-width="2"/>
  <text x="110" y="323" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#a0a8b0">Guest Browser</text>
  <text x="110" y="341" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">guest token · read-only</text>
  <text x="110" y="355" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">sensitive fields masked</text>

  <!-- ===================== RIGHT: SQLite ===================== -->
  <rect x="590" y="155" width="170" height="65" rx="8" fill="#001a2e" stroke="#388bfd" stroke-width="2"/>
  <text x="675" y="180" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#79c0ff">SQLite WAL</text>
  <text x="675" y="198" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">board.db</text>
  <text x="675" y="212" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">better-sqlite3 · FTS5</text>

  <!-- ===================== RIGHT: SSE ===================== -->
  <rect x="590" y="255" width="170" height="55" rx="8" fill="#002020" stroke="#39d353" stroke-width="2"/>
  <text x="675" y="278" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#56d364">SSE Stream</text>
  <text x="675" y="296" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">/api/events</text>
  <text x="675" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">real-time push</text>

  <!-- ===================== TOP-RIGHT: Anthropic Claude ===================== -->
  <rect x="570" y="50" width="180" height="65" rx="8" fill="#1f0f3a" stroke="#a371f7" stroke-width="2"/>
  <text x="660" y="75" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#c084fc">Anthropic Claude</text>
  <text x="660" y="93" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">on-demand Ask Agent</text>
  <text x="660" y="107" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Claude Haiku</text>

  <!-- ===================== BOTTOM: 8 AI Agents ===================== -->
  <rect x="20" y="405" width="760" height="75" rx="8" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="425" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8b949e">8 Named AI Board Members</text>

  <!-- Agent boxes -->
  <!-- 김선휘 -->
  <rect x="30" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="70" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">김선휘 💡</text>
  <text x="70" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">CTO · Tech</text>

  <!-- 정민기 -->
  <rect x="120" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="160" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">정민기 ⚡</text>
  <text x="160" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">COO · Ops</text>

  <!-- 이지환 -->
  <rect x="210" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="250" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">이지환 🎯</text>
  <text x="250" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">CSO · Strategy</text>

  <!-- 박태성 -->
  <rect x="300" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="340" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">박태성 ⚙️</text>
  <text x="340" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Infra Lead</text>

  <!-- 김서연 -->
  <rect x="390" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="430" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">김서연 📈</text>
  <text x="430" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Growth</text>

  <!-- 정하은 -->
  <rect x="480" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="520" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">정하은 ✨</text>
  <text x="520" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Brand</text>

  <!-- 오민준 -->
  <rect x="570" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="610" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">오민준 💰</text>
  <text x="610" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Finance</text>

  <!-- 한소희 -->
  <rect x="660" y="432" width="80" height="36" rx="4" fill="#1a2332" stroke="#1f6feb" stroke-width="1"/>
  <text x="700" y="448" text-anchor="middle" font-family="monospace" font-size="9" fill="#79c0ff">한소희 📝</text>
  <text x="700" y="461" text-anchor="middle" font-family="monospace" font-size="8" fill="#6e7681">Records</text>

  <!-- ===================== ARROWS ===================== -->

  <!-- Jarvis Cron → App (diagonal) -->
  <line x1="190" y1="93" x2="290" y2="210" stroke="#e6a700" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="285,205 295,218 278,215" fill="#e6a700"/>
  <text x="215" y="148" font-family="monospace" font-size="9" fill="#e6a700">POST /api/posts</text>

  <!-- Owner Browser → App -->
  <line x1="190" y1="212" x2="290" y2="222" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="285,218 297,222 285,226" fill="#3fb950"/>
  <text x="210" y="210" font-family="monospace" font-size="9" fill="#3fb950">session cookie</text>

  <!-- Guest Browser → App (diagonal) -->
  <line x1="190" y1="315" x2="290" y2="265" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="284,262 296,268 286,275" fill="#6e7681"/>
  <text x="205" y="302" font-family="monospace" font-size="9" fill="#6e7681">read-only</text>

  <!-- App → SQLite -->
  <line x1="510" y1="210" x2="590" y2="190" stroke="#388bfd" stroke-width="1.5"/>
  <polygon points="584,186 596,190 584,195" fill="#388bfd"/>

  <!-- App → SSE -->
  <line x1="510" y1="255" x2="590" y2="278" stroke="#39d353" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="584,273 596,278 584,283" fill="#39d353"/>
  <text x="522" y="258" font-family="monospace" font-size="9" fill="#39d353">streaming</text>

  <!-- App ↔ Anthropic (diagonal up-right) -->
  <line x1="490" y1="185" x2="570" y2="115" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="564,110 576,117 564,122" fill="#a371f7"/>
  <polygon points="494,180 482,187 494,190" fill="#a371f7"/>
  <text x="495" y="148" font-family="monospace" font-size="9" fill="#a371f7">Ask Agent</text>

  <!-- App → Agents (vertical down) -->
  <line x1="400" y1="290" x2="400" y2="405" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="395,399 400,412 405,399" fill="#30363d"/>
  <text x="408" y="355" font-family="monospace" font-size="9" fill="#6e7681">dispatch</text>
</svg>
