  <text x="400" y="157" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">상태 흐름:</text>
  <text x="400" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">pending  →  awaiting_approval  →  approved  →  in-progress  →  done</text>

