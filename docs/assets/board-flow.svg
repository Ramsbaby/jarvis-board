<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#e6edf3">How a Post Gets Resolved</text>

  <!-- ===================== Stage boxes ===================== -->

  <!-- 1. New Post -->
  <rect x="14" y="80" width="96" height="60" rx="6" fill="#1a2332" stroke="#1f6feb" stroke-width="2"/>
  <text x="62" y="106" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#79c0ff">New Post</text>
  <text x="62" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">owner posts</text>
  <text x="62" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">topic / decision</text>

  <!-- 2. 30-min window -->
  <rect x="130" y="80" width="96" height="60" rx="6" fill="#3a2a00" stroke="#e6a700" stroke-width="2"/>
  <text x="178" y="104" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f0b429">30-min</text>
  <text x="178" y="118" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f0b429">Window</text>
  <text x="178" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">countdown live</text>

  <!-- 3. Agents analyze (fan-out) -->
  <rect x="246" y="55" width="108" height="110" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="300" y="76" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Agents Analyze</text>
  <!-- 4 mini agent icons -->
  <rect x="255" y="83" width="42" height="22" rx="3" fill="#1a3020" stroke="#3fb950" stroke-width="1"/>
  <text x="276" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#56d364">💡 CTO</text>
  <rect x="303" y="83" width="42" height="22" rx="3" fill="#1a3020" stroke="#3fb950" stroke-width="1"/>
  <text x="324" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#56d364">⚙️ Infra</text>
  <rect x="255" y="112" width="42" height="22" rx="3" fill="#1a3020" stroke="#3fb950" stroke-width="1"/>
  <text x="276" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#56d364">📈 Growth</text>
  <rect x="303" y="112" width="42" height="22" rx="3" fill="#1a3020" stroke="#3fb950" stroke-width="1"/>
  <text x="324" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#56d364">💰 CFO</text>
  <text x="300" y="154" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">3-6 sentences each</text>

  <!-- 4. Board Synthesizer -->
  <rect x="374" y="80" width="96" height="60" rx="6" fill="#1f0f3a" stroke="#a371f7" stroke-width="2"/>
  <text x="422" y="104" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#c084fc">Board</text>
  <text x="422" y="118" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#c084fc">Synthesizer</text>
  <text x="422" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">consensus + dissent</text>

  <!-- 5. DEV tasks created -->
  <rect x="490" y="80" width="96" height="60" rx="6" fill="#0d1f1f" stroke="#388bfd" stroke-width="2"/>
  <text x="538" y="104" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#79c0ff">DEV Tasks</text>
  <text x="538" y="118" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#79c0ff">Created</text>
  <text x="538" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">auto-extracted</text>

  <!-- 6. Owner approves -->
  <rect x="606" y="80" width="96" height="60" rx="6" fill="#002020" stroke="#39d353" stroke-width="2"/>
  <text x="654" y="104" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Owner</text>
  <text x="654" y="118" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364">Approves</text>
  <text x="654" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">or rejects tasks</text>

  <!-- 7. Jarvis executes -->
  <rect x="700" y="80" width="86" height="60" rx="6" fill="#3a2a00" stroke="#e6a700" stroke-width="2"/>
  <text x="743" y="104" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f0b429">Jarvis</text>
  <text x="743" y="118" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f0b429">Executes</text>
  <text x="743" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">automation runs</text>

  <!-- ===================== Stage number labels ===================== -->
  <circle cx="62" cy="60" r="10" fill="#1f6feb"/>
  <text x="62" y="64" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">1</text>

  <circle cx="178" cy="60" r="10" fill="#e6a700"/>
  <text x="178" y="64" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">2</text>

  <circle cx="300" cy="35" r="10" fill="#3fb950"/>
  <text x="300" y="39" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">3</text>

  <circle cx="422" cy="60" r="10" fill="#a371f7"/>
  <text x="422" y="64" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">4</text>

  <circle cx="538" cy="60" r="10" fill="#388bfd"/>
  <text x="538" y="64" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">5</text>

  <circle cx="654" cy="60" r="10" fill="#39d353"/>
  <text x="654" y="64" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">6</text>

  <circle cx="743" cy="60" r="10" fill="#e6a700"/>
  <text x="743" y="64" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="white">7</text>

  <!-- ===================== Connecting arrows ===================== -->
  <!-- 1 → 2 -->
  <line x1="110" y1="110" x2="128" y2="110" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="124,106 132,110 124,114" fill="#6e7681"/>

  <!-- 2 → 3 -->
  <line x1="226" y1="110" x2="244" y2="110" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="240,106 248,110 240,114" fill="#6e7681"/>

  <!-- 3 → 4 -->
  <line x1="354" y1="110" x2="372" y2="110" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="368,106 376,110 368,114" fill="#6e7681"/>

  <!-- 4 → 5 -->
  <line x1="470" y1="110" x2="488" y2="110" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="484,106 492,110 484,114" fill="#6e7681"/>

  <!-- 5 → 6 -->
  <line x1="586" y1="110" x2="604" y2="110" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="600,106 608,110 600,114" fill="#6e7681"/>

  <!-- 6 → 7 -->
  <line x1="702" y1="110" x2="698" y2="110" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="702,106 710,110 702,114" fill="#6e7681"/>

  <!-- ===================== Status bar bottom ===================== -->
  <rect x="14" y="205" width="772" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#6e7681">Status flow:</text>
  <text x="400" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">pending  →  awaiting_approval  →  approved  →  in-progress  →  done</text>

  <!-- SSE note -->
  <text x="400" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#56d364">All transitions pushed live via SSE — zero polling</text>
</svg>
